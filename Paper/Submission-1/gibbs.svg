<svg xmlns="http://www.w3.org/2000/svg" viewBox="327 0 493 460" width="493" height="460" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5Z" fill="#444"/></marker>
</defs>
<style>
  :root {
    --fs-cond:     12.5px;
    --fs-cond-sub: 9px;
  }
  .cond      { font-size: var(--fs-cond);     fill: #333; }
  .cond-sub  { font-size: var(--fs-cond-sub); }
</style>

<!-- ITERATION -->
<rect x="454" y="20" width="240" height="32" rx="16" fill="#fff3cd" stroke="#e6ac00" stroke-width="1.5"/>
<text x="574" y="41" text-anchor="middle" font-size="13" font-weight="600">для itr = 1 &#x2026; M&#x2080; + M</text>

<line x1="574" y1="52" x2="574" y2="78" stroke="#444" stroke-width="1.3" marker-end="url(#a)"/>

<!-- DRAW STATES -->
<rect x="394" y="80" width="360" height="42" rx="7" fill="#e8f0fe" stroke="#4a7fb5" stroke-width="1.5"/>
<text x="574" y="98" text-anchor="middle" font-size="12.5" font-weight="700">Сгенерировать состояния</text>
<text x="574" y="113" text-anchor="middle" class="cond"><tspan fill="#0D47A1" font-weight="700">f</tspan>, <tspan fill="#0D47A1" font-weight="700">u</tspan><tspan dy="4" class="cond-sub" fill="#0D47A1">i</tspan><tspan dy="-4">, </tspan><tspan fill="#0D47A1" font-weight="700">&#x03C4;</tspan> | y, параметры</text>

<line x1="574" y1="122" x2="574" y2="148" stroke="#444" stroke-width="1.3" marker-end="url(#a)"/>

<!-- DRAW IDIO -->
<rect x="394" y="150" width="360" height="42" rx="7" fill="#e8f0fe" stroke="#4a7fb5" stroke-width="1.5"/>
<text x="574" y="168" text-anchor="middle" font-size="12.5" font-weight="700">Сгенерировать идиосинкратические AR и дисперсии</text>
<text x="574" y="183" text-anchor="middle" class="cond"><tspan fill="#E65100" font-weight="700">&#x03C8;</tspan><tspan dy="4" class="cond-sub" fill="#E65100">i</tspan><tspan dy="-4" fill="#E65100" font-weight="700">, &#x03C3;</tspan><tspan dy="-4" class="cond-sub" fill="#E65100">2</tspan><tspan dy="8" class="cond-sub" fill="#E65100">i</tspan><tspan dy="-4"> | u</tspan><tspan dy="4" class="cond-sub">i</tspan><tspan dy="-4"> для каждой переменной</tspan></text>

<line x1="574" y1="192" x2="574" y2="218" stroke="#444" stroke-width="1.3" marker-end="url(#a)"/>

<!-- DRAW LOADINGS -->
<rect x="394" y="220" width="360" height="42" rx="7" fill="#e8f0fe" stroke="#4a7fb5" stroke-width="1.5"/>
<text x="574" y="238" text-anchor="middle" font-size="12.5" font-weight="700">Сгенерировать факторные нагрузки</text>
<text x="574" y="253" text-anchor="middle" class="cond"><tspan fill="#6A1B9A" font-weight="700">&#x03BB;</tspan><tspan dy="4" class="cond-sub" fill="#6A1B9A">i</tspan><tspan dy="-4"> | f, u</tspan><tspan dy="4" class="cond-sub">i</tspan><tspan dy="-4">, &#x03C8;</tspan><tspan dy="4" class="cond-sub">i</tspan><tspan dy="-4">, &#x03C3;</tspan><tspan dy="-4" class="cond-sub">2</tspan><tspan dy="8" class="cond-sub">i</tspan><tspan dy="-4"> для каждой переменной</tspan></text>

<line x1="574" y1="262" x2="574" y2="288" stroke="#444" stroke-width="1.3" marker-end="url(#a)"/>

<!-- DRAW FACTOR AR -->
<rect x="394" y="290" width="360" height="55" rx="7" fill="#e8f0fe" stroke="#4a7fb5" stroke-width="1.5"/>
<text x="574" y="308" text-anchor="middle" font-size="12.5" font-weight="700">Сгенерировать AR фактора и его дисперсию</text>
<text x="574" y="323" text-anchor="middle" class="cond"><tspan fill="#1B5E20" font-weight="700">&#x03C6;</tspan> | f, &#x03C3;<tspan dy="-4" class="cond-sub">2</tspan><tspan dy="8" class="cond-sub">f</tspan><tspan dy="-4"></tspan></text>
<text x="574" y="337" text-anchor="middle" class="cond"><tspan fill="#1B5E20" font-weight="700">&#x03C3;</tspan><tspan dy="-4" class="cond-sub" fill="#1B5E20">2</tspan><tspan dy="8" class="cond-sub" fill="#1B5E20">f</tspan><tspan dy="-4"> | f, &#x03C6;</tspan></text>

<line x1="574" y1="345" x2="574" y2="371" stroke="#444" stroke-width="1.3" marker-end="url(#a)"/>

<!-- STORE -->
<rect x="394" y="373" width="360" height="42" rx="7" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
<text x="574" y="399" text-anchor="middle" font-size="12.5" font-weight="600">Сохранить результат (если itr &gt; M&#x2080;)</text>

<!-- Loop back -->
<polyline points="394,394 364,394 364,36 454,36" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#a)"/>

</svg>
